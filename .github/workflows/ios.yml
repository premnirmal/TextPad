name: iOS Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-ios:
    name: Build iOS app
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate

      - name: Install iOS platform
        # The macos-26 image ships the iOS 26 SDK but not the iOS 26 platform
        # support (simulator runtime), so xcodebuild destinations fail with
        # "iOS 26.0 is not installed" until it is downloaded on demand.
        run: sudo xcodebuild -downloadPlatform iOS

      - name: Build iOS app
        working-directory: iosApp
        run: |
          xcodebuild build \
            -project TextPad.xcodeproj \
            -scheme TextPad \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO
